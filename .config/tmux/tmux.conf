# basic settings
set -g default-shell "${SHELL}"
set -g default-command "exec ${SHELL} --noprofile"
set -g status-left-length 80
set -g renumber-windows on
set -g base-index 1
set -g mouse on

# Terminal (base — works on all 3.x)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",${TERM}:Tc"
set -g history-limit 500
set -g focus-events on

set-window-option -g automatic-rename
set-window-option -g pane-base-index 1

# change default prefix
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# pane/window/session management
bind k kill-session 
bind -n M-q kill-pane 
bind -n M-H previous-window
bind -n M-L next-window

# pane navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# pane spliting bindings
bind s split-window -vc "#{pane_current_path}"
bind i split-window -hc "#{pane_current_path}"
bind C-s split-window -c "#{pane_current_path}" -vl 33%
bind C-i split-window -c "#{pane_current_path}" -hl 33%

# resize with hjkl
bind Left resize-pane -L 1
bind Down resize-pane -D 1
bind Up resize-pane -U 1
bind Right resize-pane -R 1

# navigate through selection in vi mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# status minimal theme
set -g status-style "bg=default,fg=colour245"
set -g status-left ""
set -g status-justify left
set -g status-right "#[fg=colour2] #S "
setw -g window-status-current-format "#[fg=colour2,bold] #I:#W "
setw -g window-status-format "#[fg=colour245] #I:#W "

# pane border colors 
set -g pane-active-border-style "fg=colour2"
set -g pane-border-style "fg=colour238"
